<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Income Tax Calculator</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            background: url("elegant.jpg") center/cover no-repeat fixed;
        }

        .center-page{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container{
            width: 500px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 0 20px rgba(255,182,201,0.15);
            text-align: center;
        }

        h2{
            font-family: 'Orbitron', sans-serif;
            color: #ffb6c9;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255,182,201,0.4);
        }

        label{
            display: block;
            margin-bottom: 12px;
            color: #ffb6c9;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 15px;
            margin-bottom: 25px;
            outline: none;
        }

        input::placeholder{
            color: #d8d8d8;
        }

        button{
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(to right, #ffb6c9, #d8a7b1);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            transform: translateY(-3px);
            box-shadow: 0 0 15px #ffb6c9;
        }

        #result{
            margin-top: 30px;
            color: white;
            font-size: 1.1rem;
        }

    </style>

</head>

<body>

    <nav>
    <h2>✦ ELAINA'S CYBERSPACE</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="PersonalInfo.html">Personal Info</a></li>
        <li><a href="Tools.html">Useful Tools</a></li>
    </ul>
    </nav>

    <div class="center-page">

        <div class="container">

            <h2>INCOME TAX CALCULATOR</h2>

            <label>Enter Yearly Income (RM)</label>

            <input
                type="number"
                id="income"
                placeholder="Enter your yearly income">

            <button onclick="calculateTax()">
                Calculate Tax
            </button>

            <div id="result"></div>

        </div>

    </div>

    <script>

        function calculateTax(){

            let income =
            parseFloat(document.getElementById("income").value);

            let tax = 0;

            if(isNaN(income)){
                document.getElementById("result").innerHTML =
                "<h3>Please enter a valid income.</h3>";

                return;
            }

            // Category A
            if(income <= 5000){
                tax = 0;
            }

            // Category B
            else if(income <= 20000){
                tax = (income - 5000) * 0.01;
            }

            // Category C
            else if(income <= 35000){
                tax = 150 + ((income - 20000) * 0.03);
            }

            // Category D
            else if(income <= 50000){
                tax = 600 + ((income - 35000) * 0.08);
            }

            // Category E
            else if(income <= 70000){
                tax = 1800 + ((income - 50000) * 0.13);
            }

            // Category F
            else if(income <= 100000){
                tax = 4400 + ((income - 70000) * 0.21);
            }

            // Category G
            else if(income <= 250000){
                tax = 10700 + ((income - 100000) * 0.24);
            }

            // Category H
            else if(income <= 400000){
                tax = 46700 + ((income - 250000) * 0.245);
            }

            // Category I
            else if(income <= 600000){
                tax = 83450 + ((income - 400000) * 0.25);
            }

            // Category J
            else if(income <= 1000000){
                tax = 133450 + ((income - 600000) * 0.26);
            }

            // Category K
            else if(income <= 2000000){
                tax = 237450 + ((income - 1000000) * 0.28);
            }

            // Category L
            else{
                tax = 517450 + ((income - 2000000) * 0.30);
            }

            document.getElementById("result").innerHTML =

            "<h3>Tax Amount: RM "
            + tax.toFixed(2)
            + "</h3>";
        }

    </script>

</body>
</html>
