<style>

body{
    background: url("wallpaper.jpg") center/cover no-repeat fixed;
}

.tools-container{
    width: 90%;
    max-width: 1100px;
    margin: 60px auto;
    text-align: center;
}

.tools-wrapper{
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 30px;
    padding: 40px;
    box-shadow: 0 0 20px rgba(255,182,201,0.15);
}

.tools-container h1{
    font-family: 'Orbitron', sans-serif;
    color: #ffb6c9;
    margin-bottom: 40px;
    text-shadow: 0 0 10px rgba(255,182,201,0.4);
}

.tool-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
}

.tool-card{
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 30px;
    text-decoration: none;
    color: white;
    transition: 0.3s;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 160px;
}

.tool-card:hover{
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(255,182,201,0.4);
    border-color: #ffb6c9;
}

.tool-card span{
    font-size: 2rem;
    margin-bottom: 10px;
}

.tool-card h3{
    font-family: 'Orbitron', sans-serif;
    color: #ffb6c9;
    margin-bottom: 8px;      
}

.tool-card p{
    font-size: 0.9rem;
    color: #d8d8d8;
}

</style>
</head>
